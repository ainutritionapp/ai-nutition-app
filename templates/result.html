<!DOCTYPE html>
<html>
<head>
<title>Health Report</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#eef2f7;}

.app-bar{
position:fixed;top:0;width:100%;height:60px;
background:#4CAF50;color:white;
display:flex;align-items:center;justify-content:center;font-weight:bold;
}

.main{margin-top:70px;}

.animated-img{
width:100%;max-width:200px;
animation:float 3s ease-in-out infinite;
}
@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* POP ANIMATION */
.diet-card{
opacity:0;
transform:translateY(80px) scale(0.8);
transition:0.6s;
padding:18px;border-radius:16px;margin-bottom:15px;
}
.diet-card.show{
opacity:1;
transform:translateY(0) scale(1);
}

/* COLORS */
.monday{background:#43cea2;color:white;}
.tuesday{background:#ffd200;}
.wednesday{background:#00c6ff;color:white;}
.thursday{background:#dc2430;color:white;}
.friday{background:#38ef7d;}
.saturday{background:#f7b733;}
.sunday{background:#ffc371;}

.center-text{
position:relative;
top:-100px;
text-align:center;
}

/* BUTTON */
.btn-download{background:#38ef7d;color:white;}
.btn-generate{background:#fc466b;color:white;}

</style>
</head>

<body>

<div class="app-bar">💪 AI Nutrition App</div>

<div class="container main">

<h4 class="text-center">Hi {{name}}, your report is ready</h4>

<div class="row">

<div class="col-md-4 text-center">
<img src="{{ url_for('static', filename=image) }}" class="animated-img">
</div>

<div class="col-md-4">
<p>Age: {{age}}</p>
<p>BMI: {{bmi}}</p>
<p>Category: {{category}}</p>
<p>Calories: {{calories}}</p>
</div>

<div class="col-md-4 text-center">
<canvas id="chart"></canvas>
<div class="center-text">
<h4>{{bmi}}</h4>
<p>{{category}}</p>
</div>
</div>

</div>

<h5>Weekly Diet</h5>

<div class="row">
{% for d,m in weekly.items() %}
<div class="col-md-4">

<div class="diet-card animate-item
{% if d=='Monday' %}monday
{% elif d=='Tuesday' %}tuesday
{% elif d=='Wednesday' %}wednesday
{% elif d=='Thursday' %}thursday
{% elif d=='Friday' %}friday
{% elif d=='Saturday' %}saturday
{% elif d=='Sunday' %}sunday
{% endif %}
">

<h6>{{d}}</h6>
<p>{{m['Breakfast']}}</p>
<p>{{m['Lunch']}}</p>
<p>{{m['Dinner']}}</p>

</div>

</div>
{% endfor %}
</div>

<!-- BUTTON -->
<form action="/download_pdf" method="post">
<input type="hidden" name="name" value="{{ name }}">
<input type="hidden" name="age" value="{{ age }}">
<input type="hidden" name="bmi" value="{{ bmi }}">
<input type="hidden" name="weekly" id="weeklyData">

<button class="btn btn-download w-100 mt-3">Download PDF</button>
</form>

</div>

<script>
const weekly={{weekly|tojson}};
document.getElementById("weeklyData").value=JSON.stringify(weekly);

/* POP ANIMATION */
const cards=document.querySelectorAll(".animate-item");
const observer=new IntersectionObserver(entries=>{
entries.forEach((entry,i)=>{
if(entry.isIntersecting){
setTimeout(()=>entry.target.classList.add("show"),i*150);
}
});
});
cards.forEach(c=>observer.observe(c));

/* BMI NEEDLE */
let bmi={{bmi}};
if(bmi>40) bmi=40;

let angle;

if (bmi < 18.5) angle = (bmi / 18.5) * (Math.PI * 0.4);
else if (bmi < 25) angle = (Math.PI * 0.4) + ((bmi - 18.5) / 6.5) * (Math.PI * 0.2);
else if (bmi < 30) angle = (Math.PI * 0.6) + ((bmi - 25) / 5) * (Math.PI * 0.2);
else angle = (Math.PI * 0.8) + ((bmi - 30) / 10) * (Math.PI * 0.2);

const needle={
id:'needle',
afterDraw(chart){
const{ctx}=chart;
const meta=chart.getDatasetMeta(0);
const x=meta.data[0].x;
const y=meta.data[0].y;

ctx.save();
ctx.translate(x,y);
ctx.rotate(angle-Math.PI);

ctx.beginPath();
ctx.moveTo(0,-5);
ctx.lineTo(100,0);
ctx.lineTo(0,5);
ctx.fill();

ctx.beginPath();
ctx.arc(0,0,5,0,Math.PI*2);
ctx.fill();

ctx.restore();
}
};

new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:['Underweight','Normal','Overweight','Obese'],
datasets:[{
data:[18.5,6.5,5,10],
backgroundColor:['blue','green','yellow','red']
}]
},
options:{
rotation:-90,
circumference:180,
cutout:'70%',
animation:{duration:1500}
},
plugins:[needle]
});
</script>

</body>
</html>
