<!DOCTYPE html>
<html>
<head>
<title>AI Nutrition App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#43cea2,#185a9d);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.form-card {
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    width:100%;
    max-width:900px;
}

.title {
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.form-control, .form-select {
    border-radius:10px;
}

.btn-custom {
    background:#1e6ee6;
    color:white;
    padding:12px;
    border-radius:10px;
    width:100%;
    border:none;
}
</style>

</head>

<body>

<div class="form-card">

<div class="title">🥗 AI Nutrition Recommendation System</div>

<form method="POST">

<div class="row g-3">

<div class="col-md-6">
<label>Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="col-md-6">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="col-md-6">
<label>Height (cm)</label>
<input type="number" name="height" class="form-control" required>
</div>

<div class="col-md-6">
<label>Weight (kg)</label>
<input type="number" name="weight" class="form-control" required>
</div>

<div class="col-md-6">
<label>Gender</label>
<select name="gender" class="form-select">
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="col-md-6">
<label>Activity Level</label>
<select name="activity" class="form-select">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>

<div class="col-md-6">
<label>Goal</label>
<select name="goal" class="form-select">
<option value="loss">Weight Loss</option>
<option value="gain">Weight Gain</option>
<option value="maintain">Maintain</option>
</select>
</div>

<!-- ✅ Disease Dropdown -->
<div class="col-md-6">
<label>Disease</label>
<select name="disease" class="form-select">
<option value="none">None</option>
<option value="diabetes">Diabetes</option>
<option value="bp">High BP</option>
<option value="obesity">Obesity</option>
<option value="hormonal">Hormonal Imbalance</option>
</select>
</div>

</div>

<button class="btn-custom mt-4">🚀 Generate Plan</button>

</form>

</div>

</body>
</html>
