<!DOCTYPE html>
<html>
<head>
    <title>AI Nutrition System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .card {
            border-radius: 15px;
            animation: slideUp 0.8s ease;
        }

        /* Fade-in Page */
        body {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        /* Card Slide Animation */
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Button Hover */
        .btn-custom {
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🥗 AI Nutrition Recommendation System</h2>

        <form method="post">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Weight (kg)</label>
                    <input type="number" name="weight" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Height (cm)</label>
                    <input type="number" name="height" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-control">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Activity Level</label>
                    <select name="activity" class="form-control">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Goal</label>
                    <select name="goal" class="form-control">
                        <option value="loss">Weight Loss</option>
                        <option value="gain">Weight Gain</option>
                        <option value="maintain">Maintain</option>
                    </select>
                </div>

                <div class="col-md-12 mb-3">
                    <label>Disease</label>
                    <select name="disease" class="form-control">
                        <option value="none">None</option>
                        <option value="diabetes">Diabetes</option>
                        <option value="bp">High BP</option>
                        <option value="obesity">Obesity</option>
                        <option value="hormonal">Hormonal</option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-primary px-5 btn-custom">Generate Plan</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
